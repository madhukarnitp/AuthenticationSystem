<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-blue-500 to-cyan-400">
    <div class="bg-white w-[90%] max-w-md rounded-2xl shadow-2xl p-10 text-center">
        <div class="text-5xl mb-4">✅</div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">
            Email Verified!
        </h1>
        <p class="text-gray-500 mb-6 leading-relaxed">
            Your email has been successfully verified.
            You can now log in to your account and start using all features.
        </p>
        <a href="../login.html"
            class="inline-block px-6 py-3 rounded-lg bg-indigo-600 text-white font-medium shadow-md hover:bg-indigo-700 hover:shadow-lg active:scale-95 transition duration-200">
            Go to Login
        </a>
        <p class="text-xs text-gray-400 mt-4">
            Redirecting automatically in a few seconds...
        </p>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = "/login.html";
        }, 4000);
    </script>
</body>
</html>
