<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
        const API_URL = "/api/auth";
        const token = localStorage.getItem("userData");
        if (token) window.location.href = "/";
    </script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white w-[420px] p-8 rounded-xl shadow-lg">

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Reset Password
        </h2>

        <form id="resetForm" class="space-y-4">

            <!-- Email -->
            <div>
                <label class="text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" required
                    class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Send OTP -->
            <button type="button" onclick="sendOTP()"
                class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                Send OTP
            </button>

            <!-- OTP -->
            <div>
                <label class="text-sm font-medium text-gray-700">OTP</label>
                <input type="text" id="otp" required
                    class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- New Password -->
            <div>
                <label class="text-sm font-medium text-gray-700">New Password</label>
                <input type="password" id="password" required
                    class="w-full mt-1 px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700">
                Reset Password
            </button>

        </form>

        <div id="statusMsg" class="mt-4 text-center text-red-600 hidden">
        </div>

        <p class="mt-6 text-center text-sm text-gray-600">
            Remember your password?
            <a href="login.html" class="text-blue-600 font-medium hover:underline">
                Login
            </a>
        </p>

    </div>

    <script>

        const statusDiv = document.getElementById("statusMsg");

        function showMsg(msg) {
            statusDiv.innerText = msg;
            statusDiv.classList.remove("hidden");
        }

        // Send OTP
        async function sendOTP() {

            const email = document.getElementById("email").value;

            if (!email) {
                showMsg("Please enter email first");
                return;
            }

            try {

                const res = await fetch(`${API_URL}/forgot-password-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                showMsg(data.message);

            } catch (err) {
                showMsg("Server error");
            }

        }


        // Reset Password
        document.getElementById("resetForm").addEventListener("submit", async (e) => {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const otp = document.getElementById("otp").value;
            const password = document.getElementById("password").value;

            try {

                const res = await fetch(`${API_URL}/reset-password-otp`, {

                    method: "POST",
                    headers: { "Content-Type": "application/json" },

                    body: JSON.stringify({
                        email,
                        otp,
                        password
                    })

                });

                const data = await res.json();

                if (res.ok) {

                    alert("Password reset successful");
                    window.location.href = "login.html";

                } else {
                    showMsg(data.message);
                }

            } catch (err) {
                showMsg("Server error");
            }

        });

    </script>

</body>

</html>
