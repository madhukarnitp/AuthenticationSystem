<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Register</h2>
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">FullName</label>
                <input type="text" id="fullname" name="name" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="email" id="email" name="email" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Phone : +91 </label>
                <input type="text" id="phone" name="phone" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <span id="spanRegister">Register</span>
                <span class="hidden" id="spanPleaseWait">Please wait...</span>
            </button>
        </form>
        <div id="Status" class="mt-4 py-1 text-black font-medium text-md text-center shadow-xl hidden"></div>
        <p class="mt-4 text-center text-sm text-gray-600">
            Already have an account? 
            <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500">Login here</a>
        </p>
    </div>
    <script>
        const API_URL = './api/auth';
        document.getElementById('registerForm').addEventListener('submit', async (e) => {            
            const spanPleaseWait = document.getElementById('spanPleaseWait');
            const spanRegister = document.getElementById('spanRegister');
            e.preventDefault();
            spanRegister.classList.add('hidden');
            spanPleaseWait.classList.remove('hidden');

            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('Status');

            // Clear previous errors
            statusDiv.classList.add('hidden');
            statusDiv.innerText = '';

            try {
                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullname, email, password ,phone})
                });
                const data = await res.json();
                if (res.ok) {
                    statusDiv.innerText = 'Registration Successfull\nVerify Your Email and Login.';
                    statusDiv.classList.remove('hidden', 'bg-red-500/50');
                    statusDiv.classList.add('bg-green-500/50');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    statusDiv.innerText = data.message || data.errors[0] .message || 'Registration failed';
                    statusDiv.classList.remove('hidden');
                    statusDiv.classList.add('bg-red-500/50');
                }

            } catch (error) {
                statusDiv.innerText = 'Internal Server Error!';
                statusDiv.classList.remove('hidden');
                statusDiv.classList.add('bg-red-500/50');
            }
            spanRegister.classList.remove('hidden');
            spanPleaseWait.classList.add('hidden');
        });
    </script>
</body>
</html>
